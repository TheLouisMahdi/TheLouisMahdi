<svg width="900" height="420" viewBox="0 0 900 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">THELOUISMAHDI About Me Terminal</title>
  <desc id="desc">A cyber-terminal style summary of Mahdi Ghahremani's profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020704"/>
      <stop offset="0.48" stop-color="#071f18"/>
      <stop offset="1" stop-color="#00131a"/>
    </linearGradient>
    <linearGradient id="accent" x1="40" y1="0" x2="860" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020704"/>
      <stop offset="0.34" stop-color="#39ff88"/>
      <stop offset="0.68" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#020704"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#12382b" stroke-width="0.75" opacity="0.35"/>
    </pattern>
    <style>
      .mono { font-family: JetBrains Mono, Consolas, Monaco, monospace; }
      .blink { animation: blink 1.1s steps(2, start) infinite; }
      .scan { animation: scan 4.5s linear infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes scan { 0% { transform: translateY(-50px); opacity: .05; } 45% { opacity: .22; } 100% { transform: translateY(430px); opacity: .04; } }
    </style>
  </defs>

  <rect width="900" height="420" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="418" rx="21" stroke="#39ff88" stroke-opacity="0.32"/>
  <rect width="900" height="420" rx="22" fill="url(#grid)" opacity="0.45"/>

  <rect class="scan" x="24" y="0" width="852" height="38" rx="19" fill="#39ff88" opacity="0.08"/>

  <rect x="0" y="0" width="900" height="50" rx="22" fill="#020704" opacity="0.9"/>
  <circle cx="34" cy="25" r="6" fill="#39ff88"/>
  <circle cx="58" cy="25" r="6" fill="#00e5ff" opacity="0.85"/>
  <circle cx="82" cy="25" r="6" fill="#b8ffd2" opacity="0.65"/>
  <text x="116" y="31" class="mono" fill="#d8ffe9" font-size="16" font-weight="700">about-me.session</text>
  <text x="700" y="31" class="mono" fill="#39ff88" font-size="14">status: active</text>

  <rect x="40" y="78" width="820" height="2" fill="url(#accent)" filter="url(#glow)"/>

  <text x="52" y="122" class="mono" fill="#39ff88" font-size="18" font-weight="700">&gt; whoami</text>
  <text x="52" y="154" class="mono" fill="#d8ffe9" font-size="26" font-weight="800">Mahdi Ghahremani</text>
  <text x="52" y="184" class="mono" fill="#00e5ff" font-size="17" font-weight="700">THELOUISMAHDI · Eka Francium</text>

  <text x="52" y="230" class="mono" fill="#39ff88" font-size="18" font-weight="700">&gt; profile.summary</text>
  <text x="52" y="262" class="mono" fill="#d8ffe9" font-size="17">Electrical Engineering student building practical systems across</text>
  <text x="52" y="288" class="mono" fill="#d8ffe9" font-size="17">software, AI vision, electronics, and hardware logic.</text>

  <rect x="52" y="316" width="206" height="42" rx="10" fill="#061f17" stroke="#39ff88" stroke-opacity="0.42"/>
  <text x="74" y="343" class="mono" fill="#39ff88" font-size="14" font-weight="800">AI + VISION</text>

  <rect x="278" y="316" width="230" height="42" rx="10" fill="#061f17" stroke="#00e5ff" stroke-opacity="0.42"/>
  <text x="300" y="343" class="mono" fill="#00e5ff" font-size="14" font-weight="800">ENGINEERING TOOLS</text>

  <rect x="528" y="316" width="320" height="42" rx="10" fill="#061f17" stroke="#b8ffd2" stroke-opacity="0.42"/>
  <text x="550" y="343" class="mono" fill="#b8ffd2" font-size="14" font-weight="800">HARDWARE + DIGITAL SYSTEMS</text>

  <text x="52" y="390" class="mono" fill="#00d46a" font-size="14">&gt; mindset: precise · experimental · product-minded · learning by building</text>
  <rect class="blink" x="800" y="379" width="12" height="18" rx="2" fill="#39ff88"/>
</svg>