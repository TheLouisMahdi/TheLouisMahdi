<svg width="900" height="360" viewBox="0 0 900 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">THELOUISMAHDI Developer Metrics</title>
  <desc id="desc">A local terminal-style fallback panel for GitHub Metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020704"/>
      <stop offset="0.5" stop-color="#06281b"/>
      <stop offset="1" stop-color="#00131a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020704"/>
      <stop offset="0.35" stop-color="#39ff88"/>
      <stop offset="0.65" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#020704"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#12382b" stroke-width="0.8" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="900" height="360" rx="20" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="358" rx="19" stroke="#39ff88" stroke-opacity="0.35"/>
  <rect width="900" height="360" rx="20" fill="url(#grid)" opacity="0.45"/>

  <rect x="0" y="0" width="900" height="44" rx="20" fill="#020704" opacity="0.88"/>
  <circle cx="32" cy="22" r="6" fill="#39ff88" opacity="0.9"/>
  <circle cx="54" cy="22" r="6" fill="#00e5ff" opacity="0.75"/>
  <circle cx="76" cy="22" r="6" fill="#b8ffd2" opacity="0.65"/>
  <text x="110" y="28" fill="#d8ffe9" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="700">developer-metrics://TheLouisMahdi</text>

  <rect x="40" y="76" width="820" height="1.8" fill="url(#line)" opacity="0.9" filter="url(#glow)"/>
  <text x="52" y="118" fill="#39ff88" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="700">&gt; metrics pipeline initialized</text>
  <text x="52" y="152" fill="#d8ffe9" font-family="JetBrains Mono, Consolas, monospace" font-size="17">profile: THELOUISMAHDI</text>
  <text x="52" y="182" fill="#d8ffe9" font-family="JetBrains Mono, Consolas, monospace" font-size="17">focus: engineering systems · AI vision · hardware logic</text>
  <text x="52" y="212" fill="#d8ffe9" font-family="JetBrains Mono, Consolas, monospace" font-size="17">build style: local-first tools · clean UI · practical automation</text>

  <rect x="52" y="244" width="216" height="46" rx="10" fill="#061f17" stroke="#39ff88" stroke-opacity="0.45"/>
  <text x="72" y="273" fill="#39ff88" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="700">ENGINEERING SYSTEMS</text>

  <rect x="292" y="244" width="194" height="46" rx="10" fill="#061f17" stroke="#00e5ff" stroke-opacity="0.45"/>
  <text x="312" y="273" fill="#00e5ff" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="700">AI + VISION</text>

  <rect x="510" y="244" width="338" height="46" rx="10" fill="#061f17" stroke="#b8ffd2" stroke-opacity="0.45"/>
  <text x="530" y="273" fill="#b8ffd2" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="700">HARDWARE + SOFTWARE TOOLS</text>

  <text x="52" y="326" fill="#00d46a" font-family="JetBrains Mono, Consolas, monospace" font-size="14">GitHub Metrics workflow ready · this local panel prevents broken README images</text>
</svg>